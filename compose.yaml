services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: KnowledgeForKnowledge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    image: api
    build:
      context: .
      dockerfile: API/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=KnowledgeForKnowledge;Username=postgres;Password=postgres
    depends_on:
      - postgres

  gateway:
    image: gateway
    build:
      context: .
      dockerfile: GatewayApi/Dockerfile
    ports:
      - "5000:8080"
    depends_on:
      - api

volumes:
  postgres_data:
